# Telegraf Configuration — RPi4 Internet Speed Monitoring
# Collects system metrics and sends to InfluxDB

[global_tags]

[agent]
  interval = "20s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  # debug disabled in production (was true — caused unnecessary I/O)
  debug = false
  quiet = false
  hostname = ""
  omit_hostname = false

# ── Output: InfluxDB ──────────────────────────────────────────

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf"
  skip_database_creation = true
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"
  # Credentials from environment variables (set in docker-compose.yml)
  username = "${INFLUXDB_USER}"
  password = "${INFLUXDB_USER_PASSWORD}"
  user_agent = "telegraf"

# ── Inputs: System Metrics ────────────────────────────────────

[[inputs.file]]
  files = ["/host/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temperature"
  data_format = "value"
  data_type = "integer"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  fielddrop = ["time_*"]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs"]

[[inputs.diskio]]

[[inputs.kernel]]

[[inputs.mem]]

[[inputs.processes]]

[[inputs.swap]]

[[inputs.system]]

[[inputs.net]]
  interfaces = ["eth0", "wlan0"]

[[inputs.netstat]]

[[inputs.interrupts]]

[[inputs.linux_sysctl_fs]]

# ── Inputs: Docker Containers ─────────────────────────────────

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice_include = []
  total_include = ["cpu", "blkio", "network"]
