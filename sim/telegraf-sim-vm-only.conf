# Telegraf Configuration — RPi4 Simulation (VM-only)
# Like telegraf-sim.conf but writes exclusively to VictoriaMetrics.
# No InfluxDB dependency.
#
# Differences from telegraf-sim.conf:
#   - Single output: VictoriaMetrics only (via $VM_OUTPUT_URL)
#   - No InfluxDB output
#   - All inputs identical (full system + Docker monitoring)

[global_tags]
  env = "sim-vm-only"

[agent]
  interval = "20s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  hostname = "rpi-sim"
  omit_hostname = false

# ── Output: VictoriaMetrics (sole backend) ────────────────────
# VM accepts InfluxDB line protocol on :8428/write — same wire format,
# no code changes needed vs. writing to InfluxDB.

[[outputs.influxdb]]
  urls = ["${VM_OUTPUT_URL}"]
  database = "telegraf"
  skip_database_creation = true
  timeout = "5s"
  user_agent = "telegraf"

# ── Inputs: System Metrics ────────────────────────────────────

# CPU temperature — x86 thermal zone (produces same measurement name)
[[inputs.file]]
  files = ["/host/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temperature"
  data_format = "value"
  data_type = "integer"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  fielddrop = ["time_*"]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs"]

[[inputs.diskio]]

[[inputs.kernel]]

[[inputs.mem]]

[[inputs.processes]]

[[inputs.swap]]

[[inputs.system]]

# Net — wildcard: collect all real interfaces (no eth0/wlan0 on x86)
[[inputs.net]]

[[inputs.netstat]]

[[inputs.interrupts]]

[[inputs.linux_sysctl_fs]]

# ── Inputs: Docker Containers ─────────────────────────────────

[[inputs.docker]]
  endpoint = "tcp://docker-socket-proxy:2375"
  gather_services = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice_include = []
  total_include = ["cpu", "blkio", "network"]
