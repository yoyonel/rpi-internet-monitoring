# Telegraf Configuration — RPi4 Simulation (x86 host)
# Adapted from telegraf/telegraf.conf for local dev without a real RPi.
# Differences from production:
#   - cpu_temperature reads thermal_zone0 (x86 CPU, not BCM2711)
#   - net interfaces: wildcard (auto-detect) instead of eth0/wlan0
#   - Docker input uses same socket-proxy pattern

[global_tags]
  env = "sim"

[agent]
  interval = "20s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "10s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  hostname = "rpi-sim"
  omit_hostname = false

# ── Output: InfluxDB ──────────────────────────────────────────

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "telegraf"
  skip_database_creation = true
  retention_policy = ""
  write_consistency = "any"
  timeout = "5s"
  username = "${INFLUXDB_USER}"
  password = "${INFLUXDB_USER_PASSWORD}"
  user_agent = "telegraf"

# ── Output: VictoriaMetrics (dual-write, optional) ───────────
# Enabled when VICTORIA_METRICS_URL is set (e.g. http://victoriametrics:8089)

[[outputs.influxdb]]
  urls = ["${VICTORIA_METRICS_URL}"]
  database = "telegraf"
  skip_database_creation = true
  timeout = "5s"
  user_agent = "telegraf"

# ── Inputs: System Metrics ────────────────────────────────────

# CPU temperature — x86 thermal zone (produces same measurement name)
[[inputs.file]]
  files = ["/host/sys/class/thermal/thermal_zone0/temp"]
  name_override = "cpu_temperature"
  data_format = "value"
  data_type = "integer"

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  fielddrop = ["time_*"]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs"]

[[inputs.diskio]]

[[inputs.kernel]]

[[inputs.mem]]

[[inputs.processes]]

[[inputs.swap]]

[[inputs.system]]

# Net — wildcard: collect all real interfaces (no eth0/wlan0 on x86)
[[inputs.net]]

[[inputs.netstat]]

[[inputs.interrupts]]

[[inputs.linux_sysctl_fs]]

# ── Inputs: Docker Containers ─────────────────────────────────

[[inputs.docker]]
  endpoint = "tcp://docker-socket-proxy:2375"
  gather_services = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  perdevice_include = []
  total_include = ["cpu", "blkio", "network"]
