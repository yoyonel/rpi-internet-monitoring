# Telegraf Configuration — VictoriaMetrics Only (integration test)
# Writes exclusively to VictoriaMetrics. No InfluxDB dependency.
# Used by scripts/integration-test-vm.sh to prove VM can replace InfluxDB.

[global_tags]
  env = "vm-integration-test"

[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "5s"
  flush_jitter = "0s"
  precision = ""
  debug = false
  quiet = false
  hostname = "vm-it-host"
  omit_hostname = false

# ── Output: VictoriaMetrics (sole backend) ────────────────────
# VM accepts InfluxDB line protocol on :8428/write — same wire format,
# no code changes needed vs. writing to InfluxDB.

[[outputs.influxdb]]
  urls = ["${VM_OUTPUT_URL}"]
  database = "telegraf"
  skip_database_creation = true
  timeout = "5s"
  user_agent = "telegraf"

# ── Inputs: System Metrics ────────────────────────────────────

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  fielddrop = ["time_*"]

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs"]

[[inputs.diskio]]

[[inputs.mem]]

[[inputs.processes]]

[[inputs.swap]]

[[inputs.system]]

[[inputs.net]]
