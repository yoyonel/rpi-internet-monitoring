services:
  grafana:
    container_name: grafana
    image: grafana/grafana:11.6.14
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - speedtest
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  influxdb:
    container_name: influxdb
    image: influxdb:1.8.10
    restart: unless-stopped
    environment:
      INFLUXDB_DATA_MAX_VALUES_PER_TAG: 0
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - speedtest
    expose:
      - "8086"
    healthcheck:
      test: ["CMD-SHELL", "influx -execute 'SHOW DATABASES' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  chronograf:
    container_name: chronograf
    image: chronograf:1.9.4
    restart: unless-stopped
    networks:
      - speedtest
    ports:
      - "8888:8888"
    volumes:
      - chronograf-data:/var/lib/chronograf
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/chronograf/v1/me || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  telegraf:
    container_name: telegraf
    image: telegraf:1.38.2
    hostname: rpi-latty
    restart: unless-stopped
    environment:
      INFLUXDB_USER: ${INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD}
    networks:
      - speedtest
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      # System monitoring — read-only, minimal surface
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/utmp:/var/run/utmp:ro
    healthcheck:
      test: ["CMD-SHELL", "pgrep telegraf || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  speedtest:
    name: speedtest
    driver: bridge

volumes:
  grafana-storage:
  influxdb-data:
  chronograf-data:
