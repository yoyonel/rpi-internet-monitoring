services:
  grafana:
    container_name: grafana
    image: grafana/grafana:12.4.3
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      INFLUXDB_USER: ${INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD}
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - speedtest
    ports:
      - '127.0.0.1:3000:3000'
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  influxdb:
    container_name: influxdb
    image: influxdb:1.8.10
    restart: unless-stopped
    environment:
      INFLUXDB_DATA_MAX_VALUES_PER_TAG: 0
      INFLUXDB_HTTP_AUTH_ENABLED: 'true'
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      INFLUXDB_USER: ${INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD}
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - speedtest
    expose:
      - '8086'
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETUID
      - SETGID
      - FOWNER
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          influx
          -username "$INFLUXDB_ADMIN_USER"
          -password "$INFLUXDB_ADMIN_PASSWORD"
          -execute 'SHOW DATABASES'
          >/dev/null 2>&1 || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  chronograf:
    container_name: chronograf
    image: chronograf:1.9.4
    restart: unless-stopped
    user: '999:999'
    networks:
      - speedtest
    ports:
      - '127.0.0.1:8888:8888'
    volumes:
      - chronograf-data:/var/lib/chronograf
    depends_on:
      influxdb:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8888/chronograf/v1/me || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  docker-socket-proxy:
    container_name: docker-socket-proxy
    image: tecnativa/docker-socket-proxy:0.3
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      INFO: 1
      # All other APIs default to 0 (disabled)
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - speedtest
    expose:
      - '2375'
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL

  telegraf:
    container_name: telegraf
    image: telegraf:1.38.2
    hostname: rpi-latty
    restart: unless-stopped
    user: 'telegraf:995'
    environment:
      INFLUXDB_USER: ${INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD}
    networks:
      - speedtest
    depends_on:
      influxdb:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/utmp:/var/run/utmp:ro
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    healthcheck:
      test: ['CMD-SHELL', 'pgrep telegraf || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  speedtest:
    container_name: speedtest
    build:
      context: .
      dockerfile: Dockerfile
    image: speedtest:bookworm
    environment:
      INFLUXDB_USER: ${INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD}
    networks:
      - speedtest
    depends_on:
      influxdb:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL
    profiles:
      - run-once
      # Triggered by cron: docker compose run --rm speedtest

  speedtest-cron:
    container_name: speedtest-cron
    image: speedtest:bookworm
    restart: unless-stopped
    environment:
      INFLUXDB_USER: ${INFLUXDB_USER}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD}
      SPEEDTEST_INTERVAL: 600
    networks:
      - speedtest
    depends_on:
      influxdb:
        condition: service_healthy
    volumes:
      - ./scripts/speedtest-loop.sh:/usr/local/bin/speedtest-loop.sh:ro
    entrypoint: ['/bin/bash', '/usr/local/bin/speedtest-loop.sh']
    security_opt:
      - no-new-privileges:true
      - label=disable
    cap_drop:
      - ALL

networks:
  speedtest:
    name: speedtest
    driver: bridge

volumes:
  grafana-storage:
  influxdb-data:
  chronograf-data:
