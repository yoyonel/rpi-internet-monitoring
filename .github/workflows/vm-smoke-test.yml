name: VM Smoke Tests

on:
  push:
    branches: [master]
    paths:
      - 'docker-compose.yml'
      - 'sim/**'
      - 'telegraf/**'
      - 'docker-entrypoint.sh'
      - '.github/workflows/vm-smoke-test.yml'
  pull_request:
    paths:
      - 'docker-compose.yml'
      - 'sim/**'
      - 'telegraf/**'
      - 'docker-entrypoint.sh'
      - '.github/workflows/vm-smoke-test.yml'
  workflow_dispatch:

jobs:
  vm-smoke:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Start VictoriaMetrics
        run: |
          docker run -d --name victoriametrics \
            -p 8428:8428 \
            victoriametrics/victoria-metrics:v1.142.0 \
            -search.latencyOffset=0s

          echo "Waiting for VM to be healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8428/health >/dev/null 2>&1; then
              echo "VM is healthy after ${i}s"
              break
            fi
            if [[ "$i" -eq 30 ]]; then
              echo "VM did not become healthy in 30s"
              docker logs victoriametrics
              exit 1
            fi
            sleep 1
          done

      - name: 'Test 1: healthcheck'
        run: |
          status=$(curl -sf -o /dev/null -w '%{http_code}' \
            http://localhost:8428/health)
          [[ "$status" == "200" ]] && echo "✓ /health → 200" \
            || { echo "✗ /health → $status"; exit 1; }

      - name: 'Test 2: write via InfluxDB HTTP API'
        run: |
          # Port 8428/write accepts InfluxDB line protocol over HTTP.
          # Port 8089 (-influxListenAddr) is raw TCP only.
          TS=$(date +%s)000000000
          curl -sf -d "cpu,cpu=cpu-total,host=ci usage_idle=95.2,usage_system=2.1 $TS" \
            'http://localhost:8428/write?db=telegraf'
          curl -sf -d "mem,host=ci used_percent=42.5 $TS" \
            'http://localhost:8428/write?db=telegraf'
          SPD="speedtest,result_id=test-001"
          SPD="$SPD ping_latency=11.6"
          SPD="$SPD,download_bandwidth=941000000"
          SPD="$SPD,upload_bandwidth=681000000"
          SPD="$SPD $TS"
          curl -sf -d "$SPD" \
            'http://localhost:8428/write?db=speedtest'
          # Save timestamp (seconds) for query steps
          echo "TS_SEC=$(date +%s)" >> "$GITHUB_ENV"
          echo "✓ Line protocol writes accepted"

      - name: Flush and wait for indexing
        run: |
          curl -sf http://localhost:8428/internal/force_flush
          sleep 2

      - name: 'Test 3: query via MetricsQL'
        run: |
          result=$(curl -sf 'http://localhost:8428/api/v1/query' \
            --data-urlencode 'query=cpu_usage_idle{cpu="cpu-total"}' \
            --data-urlencode "time=$TS_SEC")
          echo "$result" | jq .
          value=$(echo "$result" | jq -r '.data.result[0].value[1]')
          [[ "$value" == "95.2" ]] && echo "✓ cpu_usage_idle = 95.2" \
            || { echo "✗ got $value"; exit 1; }

      - name: 'Test 4: query speedtest data'
        run: |
          result=$(curl -sf 'http://localhost:8428/api/v1/query' \
            --data-urlencode \
              'query=speedtest_download_bandwidth{result_id="test-001"}' \
            --data-urlencode "time=$TS_SEC")
          value=$(echo "$result" | jq -r '.data.result[0].value[1]')
          [[ "$value" == "941000000" ]] \
            && echo "✓ download_bandwidth = 941000000" \
            || { echo "✗ got $value"; exit 1; }

      - name: 'Test 5: export data'
        run: |
          # Export all speedtest metrics
          result=$(curl -sf 'http://localhost:8428/api/v1/export' \
            --data-urlencode 'match={__name__=~"speedtest_.*"}')
          echo "$result"
          count=$(echo "$result" | wc -l)
          [[ "$count" -ge 3 ]] && echo "✓ Exported $count metric lines" || { echo "✗ Only $count lines"; exit 1; }

      - name: 'Test 6: metric naming convention'
        run: |
          # Verify VM uses {measurement}_{field} naming
          labels=$(curl -sf 'http://localhost:8428/api/v1/label/__name__/values')
          echo "$labels" | jq .
          metrics="cpu_usage_idle cpu_usage_system"
          metrics="$metrics mem_used_percent"
          metrics="$metrics speedtest_ping_latency"
          metrics="$metrics speedtest_download_bandwidth"
          metrics="$metrics speedtest_upload_bandwidth"
          for metric in $metrics; do
            if echo "$labels" | jq -e ".data | index(\"$metric\")" > /dev/null; then
              echo "✓ $metric exists"
            else
              echo "✗ $metric missing"; exit 1
            fi
          done

      - name: 'Test 7: vmui accessible'
        run: |
          status=$(curl -sf -o /dev/null -w '%{http_code}' http://localhost:8428/vmui/)
          [[ "$status" == "200" ]] && echo "✓ vmui → 200" || { echo "✗ vmui → $status"; exit 1; }

      - name: Cleanup
        if: always()
        run: docker rm -f victoriametrics 2>/dev/null || true
