name: Lint

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          sudo wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
          sudo wget -qO /usr/local/bin/shfmt \
            https://github.com/mvdan/sh/releases/download/v3.10.0/shfmt_v3.10.0_linux_amd64
          sudo chmod +x /usr/local/bin/shfmt
          pip install --quiet yamllint ruff

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Run unit tests with coverage
        run: |
          mkdir -p coverage
          node --test --experimental-test-coverage \
            --test-reporter lcov --test-reporter-destination coverage/lcov.info \
            --test-reporter spec --test-reporter-destination stdout \
            tests/lib.test.js tests/status-bar.test.js

      - name: Run Python unit tests
        run: python3 tests/test_vm_to_datajson.py -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          retention-days: 14
