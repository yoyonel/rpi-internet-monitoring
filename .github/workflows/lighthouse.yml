name: Lighthouse Audit

on:
  # Run AFTER GitHub Pages preview is deployed (PRs) or gh-pages deploy (master)
  workflow_run:
    workflows: ['Preview PR — GitHub Pages', 'Deploy GitHub Pages']
    types: [completed]
  # Weekly standalone run (Monday 06:00 UTC)
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  lighthouse:
    name: Lighthouse (${{ matrix.preset }})
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        preset: [mobile, desktop]
    steps:
      - uses: actions/checkout@v6

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Determine target URL
        id: url
        run: |
          bash scripts/ci/lighthouse-target-url.sh \
            "${{ github.event.workflow_run.name }}" \
            '${{ toJSON(github.event.workflow_run.pull_requests) }}'

      - name: Run Lighthouse (${{ matrix.preset }})
        run: |
          set -euo pipefail
          URL="${{ steps.url.outputs.url }}"
          ARGS=(
            "$URL"
            --output html --output json
            --output-path "./lighthouse-${{ matrix.preset }}"
            --chrome-flags="--headless --no-sandbox"
          )
          if [[ "${{ matrix.preset }}" == "desktop" ]]; then
            ARGS+=(--preset desktop)
          fi
          lighthouse "${ARGS[@]}"

      - name: Extract scores & build summary
        id: scores
        env:
          TARGET_URL: ${{ steps.url.outputs.url }}
        run: |
          bash scripts/ci/lighthouse-extract-scores.sh \
            "./lighthouse-${{ matrix.preset }}.report.json" \
            "${{ matrix.preset }}"

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-${{ matrix.preset }}
          path: |
            lighthouse-${{ matrix.preset }}.report.html
            lighthouse-${{ matrix.preset }}.report.json
          retention-days: 30

  comment:
    name: Comment PR with Lighthouse scores
    needs: lighthouse
    if: github.event.workflow_run.name == 'Preview PR — GitHub Pages'
    runs-on: ubuntu-latest
    steps:
      - name: Download reports
        uses: actions/download-artifact@v7
        with:
          path: reports

      - name: Build comment body
        id: body
        run: bash scripts/ci/lighthouse-comment-body.sh reports

      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash scripts/ci/lighthouse-post-comment.sh \
            "${{ steps.body.outputs.body }}" \
            "${{ github.repository }}" \
            '${{ toJSON(github.event.workflow_run.pull_requests) }}' \
            "${{ github.ref_name }}"

  badges:
    name: Update Lighthouse badges
    needs: lighthouse
    if: github.event.workflow_run.name != 'Preview PR — GitHub Pages'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download reports
        uses: actions/download-artifact@v7
        with:
          path: reports

      - name: Generate badge JSON files
        run: bash scripts/ci/lighthouse-generate-badges.sh reports badges

      - name: Push badges to gh-pages
        run: |
          bash scripts/ci/lighthouse-push-badges.sh badges \
            "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
