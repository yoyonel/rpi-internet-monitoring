name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'gh-pages/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live data and build page
        run: |
          set -euo pipefail
          BUILD_DIR="/tmp/gh-pages-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from live GitHub Pages ──"
          curl -sfL "https://yoyonel.github.io/rpi-internet-monitoring/" -o "$BUILD_DIR/live.html"

          python3 scripts/extract-live-data.py "$BUILD_DIR/live.html" "$BUILD_DIR"
          python3 scripts/render-template.py gh-pages/index.template.html "$BUILD_DIR/data.json" "$BUILD_DIR/alerts.json" "$BUILD_DIR/index.html"

          cp gh-pages/style.css gh-pages/app.js "$BUILD_DIR/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/gh-pages-build
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
