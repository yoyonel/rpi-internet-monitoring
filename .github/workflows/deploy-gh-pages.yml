name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'gh-pages/**'
      - 'scripts/build-gh-pages.sh'
      - 'scripts/render-template.py'
      - 'scripts/extract-live-data.py'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch data from gh-pages branch and rebuild
        run: |
          set -euo pipefail
          BUILD_DIR="/tmp/gh-pages-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from gh-pages branch ──"
          git show origin/gh-pages:data.json > "$BUILD_DIR/data.json" 2>/dev/null || \
            cp tests/fixtures/data.json "$BUILD_DIR/data.json"
          git show origin/gh-pages:alerts.json > "$BUILD_DIR/alerts.json" 2>/dev/null || \
            cp tests/fixtures/alerts.json "$BUILD_DIR/alerts.json"

          npm install -g terser
          bash scripts/build-gh-pages.sh "$BUILD_DIR" "$BUILD_DIR/data.json" "$BUILD_DIR/alerts.json"

      - name: Prepare build for deployment
        run: |
          touch /tmp/gh-pages-build/.nojekyll

      - name: Push to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: /tmp/gh-pages-build
          clean-exclude: |
            pr-preview
            badges
          force: false
