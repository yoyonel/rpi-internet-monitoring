name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'gh-pages/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live data and build page
        run: |
          set -euo pipefail
          BUILD_DIR="/tmp/gh-pages-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from live GitHub Pages ──"
          curl -sfL "https://yoyonel.github.io/rpi-internet-monitoring/" -o "$BUILD_DIR/live.html"

          python3 << 'PYEOF'
          import re, json

          with open("/tmp/gh-pages-build/live.html") as f:
              html = f.read()

          m = re.search(r'(?:var|const)\s+RAW_DATA\s*=\s*({.*?});', html, re.DOTALL)
          with open("/tmp/gh-pages-build/data.json", "w") as f:
              f.write(m.group(1))

          m2 = re.search(r'(?:var|const)\s+ALERTS\s*=\s*(\[.*?\]);', html, re.DOTALL)
          with open("/tmp/gh-pages-build/alerts.json", "w") as f:
              f.write(m2.group(1))

          pts = len(json.loads(m.group(1)).get('results', [{}])[0].get('series', [{}])[0].get('values', []))
          print(f"  → {pts} data points extracted")
          PYEOF

          python3 << 'PYEOF'
          from datetime import datetime

          with open("gh-pages/index.template.html") as f:
              html = f.read()
          with open("/tmp/gh-pages-build/data.json") as f:
              data = f.read()
          with open("/tmp/gh-pages-build/alerts.json") as f:
              alerts = f.read()

          now = datetime.now().strftime('%d/%m/%Y %H:%M')
          gen = datetime.now().strftime('%d/%m/%Y à %H:%M:%S')

          html = html.replace('"__SPEEDTEST_DATA__"', data)
          html = html.replace('"__ALERTS_DATA__"', alerts)
          html = html.replace('__LAST_UPDATE__', now)
          html = html.replace('__GENERATED_AT__', gen)

          with open("/tmp/gh-pages-build/index.html", "w") as f:
              f.write(html)
          print(f"  → index.html ({len(html):,} bytes)")
          PYEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/gh-pages-build
          
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
