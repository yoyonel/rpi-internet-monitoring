name: Deploy GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - 'gh-pages/**'
      - 'scripts/render-template.py'
      - 'scripts/extract-live-data.py'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch data from gh-pages branch and rebuild
        run: |
          set -euo pipefail
          BUILD_DIR="/tmp/gh-pages-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from gh-pages branch ──"
          git show origin/gh-pages:data.json > "$BUILD_DIR/data.json" 2>/dev/null || \
            cp tests/fixtures/data.json "$BUILD_DIR/data.json"
          git show origin/gh-pages:alerts.json > "$BUILD_DIR/alerts.json" 2>/dev/null || \
            cp tests/fixtures/alerts.json "$BUILD_DIR/alerts.json"

          python3 scripts/render-template.py \
            gh-pages/index.template.html \
            "$BUILD_DIR/data.json" \
            "$BUILD_DIR/alerts.json" \
            "$BUILD_DIR/index.html"

          cp gh-pages/style.css "$BUILD_DIR/"
          cp -r gh-pages/fonts "$BUILD_DIR/"
          npm install -g terser
          terser gh-pages/app.js --compress --mangle --module -o "$BUILD_DIR/app.js"
          terser gh-pages/lib.js --compress --mangle --module -o "$BUILD_DIR/lib.js"

      - name: Push to gh-pages branch
        run: |
          set -euo pipefail
          BUILD_DIR="/tmp/gh-pages-build"
          REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          cd /tmp
          git clone --depth 1 --branch gh-pages "$REPO_URL" gh-pages-deploy 2>/dev/null || {
            mkdir gh-pages-deploy && cd gh-pages-deploy && git init -q && git checkout -q -b gh-pages
            git remote add origin "$REPO_URL"
          }
          cd /tmp/gh-pages-deploy

          # Update site files (preserves badges/ and other extra content)
          cp "$BUILD_DIR"/index.html "$BUILD_DIR"/style.css "$BUILD_DIR"/app.js "$BUILD_DIR"/lib.js .
          cp "$BUILD_DIR"/data.json "$BUILD_DIR"/alerts.json .
          cp -r "$BUILD_DIR"/fonts .
          touch .nojekyll

          git config user.email "gh-pages-bot@users.noreply.github.com"
          git config user.name "GitHub Pages Bot"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -q -m "Update monitoring page — $(date -Iseconds)"
            git push -q origin gh-pages
          fi
