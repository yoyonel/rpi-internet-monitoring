name: E2E — VM Data

on:
  push:
    branches: [master]
  pull_request:

jobs:
  e2e-vm:
    name: E2E tests with VictoriaMetrics data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies and Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Rebase fixture timestamps to now
        run: |
          python3 -c "
          import json, time
          with open('tests/fixtures/data-vm.json') as f:
              d = json.load(f)
          series = d['results'][0]['series'][0]
          vals = series['values']
          # Parse ISO timestamps, compute offset to make last point = 5 min ago
          from datetime import datetime, timezone
          def parse_ts(s):
              return datetime.fromisoformat(s.replace('Z', '+00:00')).timestamp()
          latest = max(parse_ts(r[0]) for r in vals)
          offset = time.time() - 300 - latest  # last point = 5 min ago
          for r in vals:
              old_ts = parse_ts(r[0])
              new_dt = datetime.fromtimestamp(old_ts + offset, tz=timezone.utc)
              r[0] = new_dt.strftime('%Y-%m-%dT%H:%M:%SZ')
          with open('tests/fixtures/data-vm.json', 'w') as f:
              json.dump(d, f)
          print(f'Rebased {len(vals)} points, offset={offset:.0f}s')
          "

      - name: Start preview with VM fixture data
        run: |
          bash scripts/preview-dev.sh 8080 --data tests/fixtures/data-vm.json &
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run E2E tests
        run: E2E_BASE_URL=http://localhost:8080 npx playwright test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-vm-results
          path: test-results/
          retention-days: 7
