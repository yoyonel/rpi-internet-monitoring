name: Preview PR — Surge

on:
  pull_request:
    paths:
      - 'gh-pages/**'
      - 'scripts/extract-live-data.py'
      - 'scripts/render-template.py'
      - 'scripts/publish-gh-pages.sh'
      - 'scripts/preview-dev.sh'
      - 'tests/**'
      - 'playwright.config.js'
      - '.github/workflows/preview-pr.yml'

permissions:
  pull-requests: write

jobs:
  deploy-and-test:
    name: Deploy preview & E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build page with production data
        run: |
          set -euo pipefail
          PROD_URL="https://yoyonel.github.io/rpi-internet-monitoring"
          BUILD_DIR="/tmp/surge-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from production site ──"
          curl -fsSL "$PROD_URL/data.json"   -o "$BUILD_DIR/data.json"
          curl -fsSL "$PROD_URL/alerts.json" -o "$BUILD_DIR/alerts.json"
          echo "  data.json:   $(wc -c < "$BUILD_DIR/data.json") bytes"
          echo "  alerts.json: $(wc -c < "$BUILD_DIR/alerts.json") bytes"

          echo "── Building page from PR template + prod data ──"
          python3 scripts/render-template.py \
            gh-pages/index.template.html \
            "$BUILD_DIR/data.json" \
            "$BUILD_DIR/alerts.json" \
            "$BUILD_DIR/index.html" \
            "(PR preview)"

          echo "── Verifying extract-live-data.py round-trip ──"
          python3 scripts/extract-live-data.py "$BUILD_DIR/index.html" "$BUILD_DIR"

          mkdir -p _surge_deploy
          cp "$BUILD_DIR/index.html" _surge_deploy/
          cp "$BUILD_DIR/data.json" "$BUILD_DIR/alerts.json" _surge_deploy/
          cp gh-pages/style.css _surge_deploy/
          for f in app.js lib.js state.js sync-status.js alerts.js \
                   charts.js time-controls.js time-picker.js; do
            cp "gh-pages/$f" _surge_deploy/
          done
          cp -r gh-pages/fonts _surge_deploy/

      - name: Deploy to Surge
        id: surge
        uses: afc163/surge-preview@v1
        with:
          surge_token: ${{ secrets.SURGE_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dist: _surge_deploy
          build: echo "already built"

      - name: Install dependencies and Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: |
          URL="${{ steps.surge.outputs.preview_url }}"
          # Ensure URL has https:// prefix
          [[ "$URL" == http* ]] || URL="https://$URL"
          echo "Testing $URL"
          E2E_BASE_URL="$URL" npx playwright test

      - name: Publish screenshot to preview
        if: success()
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          URL="${{ steps.surge.outputs.preview_url }}"
          [[ "$URL" == http* ]] || URL="https://$URL"
          DOMAIN="${URL#https://}"
          cp test-results/preview.png _surge_deploy/
          npx surge _surge_deploy "$DOMAIN" --token "$SURGE_TOKEN"

      - name: Comment PR with screenshot
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL="${{ steps.surge.outputs.preview_url }}"
          [[ "$URL" == http* ]] || URL="https://$URL"
          bash scripts/pr-comment-screenshot.sh \
            "$URL" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.sha }}"
