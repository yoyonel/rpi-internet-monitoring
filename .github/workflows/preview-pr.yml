name: Preview PR — GitHub Pages

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
    paths:
      - 'gh-pages/**'
      - 'scripts/build-gh-pages.sh'
      - 'scripts/extract-live-data.py'
      - 'scripts/render-template.py'
      - 'scripts/publish-gh-pages.sh'
      - 'scripts/preview-dev.sh'
      - 'tests/**'
      - 'playwright.config.js'
      - '.github/workflows/preview-pr.yml'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    name: Build & E2E tests
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build page with production data
        run: |
          set -euo pipefail
          PROD_URL="https://yoyonel.github.io/rpi-internet-monitoring"
          BUILD_DIR="/tmp/preview-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from production site ──"
          curl -fsSL "$PROD_URL/data.json"   -o "$BUILD_DIR/data.json"
          curl -fsSL "$PROD_URL/alerts.json" -o "$BUILD_DIR/alerts.json"
          echo "  data.json:   $(wc -c < "$BUILD_DIR/data.json") bytes"
          echo "  alerts.json: $(wc -c < "$BUILD_DIR/alerts.json") bytes"

          echo "── Verifying extract-live-data.py round-trip ──"
          bash scripts/build-gh-pages.sh "$BUILD_DIR" "$BUILD_DIR/data.json" "$BUILD_DIR/alerts.json" "(PR preview)"
          python3 scripts/extract-live-data.py "$BUILD_DIR/index.html" "$BUILD_DIR"

      - name: Install dependencies and Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Start preview server and run E2E tests
        run: |
          BUILD_DIR="/tmp/preview-build"
          cd "$BUILD_DIR" && python3 -m http.server 8080 &
          sleep 2
          E2E_BASE_URL="http://localhost:8080" \
            npx playwright test tests/e2e.spec.js

      - name: Prepare preview site
        run: |
          BUILD_DIR="/tmp/preview-build"
          mkdir -p _preview_site
          cp "$BUILD_DIR"/index.html "$BUILD_DIR"/style.css _preview_site/
          cp "$BUILD_DIR"/data.json "$BUILD_DIR"/alerts.json _preview_site/
          cp "$BUILD_DIR"/*.js _preview_site/
          cp -r "$BUILD_DIR"/fonts _preview_site/
          # Include E2E screenshot if available
          [ -f test-results/preview.png ] && cp test-results/preview.png _preview_site/ || true

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-site
          path: _preview_site/

  deploy-preview:
    name: Deploy PR preview
    needs: [build-and-test]
    if: always()
    runs-on: ubuntu-latest
    concurrency: preview-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Download preview artifact
        if: github.event.action != 'closed'
        uses: actions/download-artifact@v4
        with:
          name: preview-site
          path: preview-site

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./preview-site/
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: auto
          comment: true
