name: Preview PR — Surge

on:
  pull_request:
    paths:
      - 'gh-pages/**'
      - 'scripts/extract-live-data.py'
      - 'scripts/render-template.py'
      - 'scripts/publish-gh-pages.sh'
      - 'scripts/preview-dev.sh'
      - 'tests/**'
      - 'playwright.config.js'
      - '.github/workflows/preview-pr.yml'

permissions:
  pull-requests: write

jobs:
  deploy-and-test:
    name: Deploy preview & E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch live data and build page
        run: |
          set -euo pipefail
          BUILD_DIR="/tmp/surge-build"
          mkdir -p "$BUILD_DIR"

          echo "── Fetching data from live GitHub Pages ──"
          curl -sfL "https://yoyonel.github.io/rpi-internet-monitoring/" -o "$BUILD_DIR/live.html"

          python3 scripts/extract-live-data.py "$BUILD_DIR/live.html" "$BUILD_DIR"
          python3 scripts/render-template.py \
            gh-pages/index.template.html \
            "$BUILD_DIR/data.json" \
            "$BUILD_DIR/alerts.json" \
            "$BUILD_DIR/index.html" \
            "(PR preview)"

          mkdir -p _surge_deploy
          cp "$BUILD_DIR/index.html" _surge_deploy/
          cp gh-pages/style.css gh-pages/app.js _surge_deploy/

      - name: Deploy to Surge
        id: surge
        uses: afc163/surge-preview@v1
        with:
          surge_token: ${{ secrets.SURGE_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dist: _surge_deploy
          build: echo "already built"

      - name: Install dependencies and Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: E2E smoke tests
        run: |
          URL="${{ steps.surge.outputs.preview_url }}"
          # Ensure URL has https:// prefix
          [[ "$URL" == http* ]] || URL="https://$URL"
          echo "Testing $URL"
          E2E_BASE_URL="$URL" npx playwright test
