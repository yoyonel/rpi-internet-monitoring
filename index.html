<!doctype html>
<!-- Deployed via GitHub Actions — see .github/workflows/deploy-gh-pages.yml -->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="data:," />
    <meta
      name="description"
      content="Tableau de bord temps réel du débit internet via Speedtest Ookla sur Raspberry Pi 4. Download, upload, latence — mis à jour toutes les 10 minutes."
    />
    <title>Internet Speed Monitor — RPi4</title>
    <link rel="preload" href="data.json" as="fetch" crossorigin />
    <link rel="preload" href="fonts/geist-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <div class="inner">
        <div class="brand">speed<span class="hi">monitor</span></div>
        <div class="meta">
          <span class="sync-dot" id="syncDot" title=""></span>Mise &agrave; jour :
          <time datetime="2026-05-02T23:11:23.128594+02:00">02/05/2026 23:11 (CEST)</time>
        </div>
      </div>
    </nav>

    <main class="w">
      <section class="hero">
        <h1>Internet Speed Monitor</h1>
        <p class="sub">Raspberry Pi 4 &mdash; Speedtest Ookla toutes les 10 min</p>
      </section>

      <div class="stats" id="statsRow"></div>

      <section class="sb-section">
        <div class="stitle">Statut 30 jours</div>
        <div id="statusBars"></div>
      </section>

      <section class="alerts" id="alertsSec">
        <div class="stitle">Alertes RPi</div>
        <div id="alertsList"></div>
      </section>

      <div class="tp">
        <button class="nb" id="btnBack" title="Reculer">&laquo;</button>
        <div class="rg">
          <button class="rb rb-today on" id="btnToday" data-hours="today">Auj.</button>
          <button class="rb" data-hours="6">6h</button>
          <button class="rb" data-hours="12">12h</button>
          <button class="rb" data-hours="24">24h</button>
          <button class="rb" data-hours="48">2j</button>
          <button class="rb" data-hours="168">7j</button>
          <button class="rb" data-hours="720">30j</button>
        </div>
        <button class="nb" id="btnFwd" title="Avancer">&raquo;</button>
        <button class="zb" id="btnZoomOut" title="Zoom −">&minus;</button>
        <button class="zb" id="btnZoomIn" title="Zoom +">+</button>
        <button class="rl-btn" id="rangeLabelBtn">
          <span class="rl" id="rangeLabel"></span>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path
              d="M3 5l3 3 3-3"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </div>

      <!-- Grafana-style time range picker -->
      <div class="tr-picker" id="trPicker" style="display: none">
        <div class="tr-left">
          <div class="tr-section-title">Plage absolue</div>
          <div class="tr-cal" id="trCal"></div>
          <div class="tr-abs">
            <label>De <input type="datetime-local" id="trFrom" step="60" /></label>
            <label>&Agrave; <input type="datetime-local" id="trTo" step="60" /></label>
            <button class="tr-apply" id="trApply">Appliquer</button>
          </div>
          <div class="tr-recent-section" id="trRecentSec" style="display: none">
            <div class="tr-section-title">R&eacute;cents</div>
            <div class="tr-recent" id="trRecent"></div>
          </div>
        </div>
        <div class="tr-right">
          <div class="tr-section-title">Plages relatives</div>
          <div class="tr-rel" id="trRel"></div>
        </div>
      </div>

      <div class="panel">
        <div class="hd">
          <h2>Bandwidth</h2>
          <div class="lg" id="bwLeg"></div>
        </div>
        <canvas id="bwChart"></canvas>
      </div>

      <div class="panel">
        <div class="hd">
          <h2>Latency</h2>
          <div class="lg" id="piLeg"></div>
        </div>
        <canvas id="piChart"></canvas>
      </div>
    </main>

    <footer>
      <p>
        <a href="https://www.speedtest.net/apps/cli">Ookla Speedtest CLI</a> sur Raspberry Pi 4
        &mdash; G&eacute;n&eacute;r&eacute; le 02/05/2026 à 23:11:23 (CEST)
      </p>
    </footer>

    <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
    <script type="module" src="app.js"></script>
    <script>
      setTimeout(function () {
        location.reload();
      }, 660000);
    </script>
  </body>
</html>
