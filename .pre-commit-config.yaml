repos:
  - repo: local
    hooks:
      # ── Shell ──────────────────────────────────────────────
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        args: [-x]

      - id: shfmt
        name: shfmt
        entry: shfmt
        language: system
        types: [shell]
        args: [-i, '4', -ci, -w]

      # ── Dockerfile ─────────────────────────────────────────
      - id: hadolint
        name: hadolint
        entry: hadolint
        language: system
        types: [dockerfile]

      # ── YAML ───────────────────────────────────────────────
      - id: yamllint
        name: yamllint
        entry: yamllint
        language: system
        types: [yaml]
        args: [-c, .yamllint.yml]

  # ── Prettier (HTML, CSS, JS, JSON, MD, YAML) ──────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        args: [--write, --ignore-unknown]
        exclude: ^(grafana|speedtest|telegraf)/

  # ── Python ─────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.6
    hooks:
      - id: ruff
      - id: ruff-format
